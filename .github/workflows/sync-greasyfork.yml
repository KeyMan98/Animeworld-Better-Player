name: Sync to Greasy Fork on Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag della release da sincronizzare (es: 2.3.0)'
        required: true
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Get Release info
        id: get_release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_JSON=$(curl -s \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.event.inputs.release_tag }}")
          else
            RELEASE_JSON=$(curl -s \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/${{ github.event.release.id }}")
          fi

          RELEASE_ID=$(echo "$RELEASE_JSON" | jq -r '.id')
          RELEASE_BODY=$(echo "$RELEASE_JSON" | jq -r '.body // ""')

          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT
          printf '%s' "$RELEASE_BODY" > release_body.txt
          echo "Body salvato ($(wc -c < release_body.txt) bytes)"

      - name: Download versioned .user.js asset
        id: download
        run: |
          RELEASE_ID=${{ steps.get_release.outputs.release_id }}

          ASSET_URL=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets" \
            | jq -r '.[] | select(.name | endswith(".user.js")) | select(.name != "animeworld-better-player.user.js") | .url')

          if [ -z "$ASSET_URL" ]; then
            echo "No versioned .user.js asset found. Skipping."
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          curl -L \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "$ASSET_URL" \
            -o animeworld-better-player.user.js

          echo "Downloaded: $(wc -c < animeworld-better-player.user.js) bytes"
          echo "found=true" >> $GITHUB_OUTPUT

      - name: Delete existing fixed-name asset if present
        if: steps.download.outputs.found == 'true'
        run: |
          RELEASE_ID=${{ steps.get_release.outputs.release_id }}

          EXISTING_ID=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets" \
            | jq -r '.[] | select(.name == "animeworld-better-player.user.js") | .id')

          if [ -n "$EXISTING_ID" ] && [ "$EXISTING_ID" != "null" ]; then
            curl -s -X DELETE \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/assets/${EXISTING_ID}"
            echo "Deleted existing asset ID: $EXISTING_ID"
          fi

      - name: Upload fixed-name asset
        if: steps.download.outputs.found == 'true'
        run: |
          RELEASE_ID=${{ steps.get_release.outputs.release_id }}

          curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/javascript" \
            --data-binary @animeworld-better-player.user.js \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=animeworld-better-player.user.js"

          echo "Upload to GitHub Release completed!"

      - name: Trigger Greasy Fork sync and update changelog
        if: steps.download.outputs.found == 'true'
        env:
          GF_TOKEN: ${{ secrets.GREASYFORK_TOKEN }}
        run: |
          sleep 15

          SYNC_HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Token $GF_TOKEN" \
            "https://greasyfork.org/scripts/571464/sync")
          echo "GF sync trigger: $SYNC_HTTP"

          sleep 20

          CHANGELOG=$(cat release_body.txt)
          if [ -z "$CHANGELOG" ]; then
            echo "Nessun changelog nel body della release. Skip."
            exit 0
          fi

          SCRIPT_VERSION_ID=$(curl -s \
            -H "Authorization: Token $GF_TOKEN" \
            "https://greasyfork.org/scripts/571464/versions.json" \
            | jq -r '.[0].id')

          echo "GF script_version id: $SCRIPT_VERSION_ID"

          if [ -z "$SCRIPT_VERSION_ID" ] || [ "$SCRIPT_VERSION_ID" = "null" ]; then
            echo "Impossibile trovare l'ID versione GF. Skip aggiornamento changelog."
            exit 0
          fi

          UPDATE_HTTP=$(curl -s -o response.txt -w "%{http_code}" -X PATCH \
            -H "Authorization: Token $GF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"script_version\": {\"changelog\": $(cat release_body.txt | jq -Rs .)}}" \
            "https://greasyfork.org/scripts/571464/versions/${SCRIPT_VERSION_ID}.json")

          echo "Changelog update HTTP: $UPDATE_HTTP"
          cat response.txt
